name: 自动拉取反代IP(中文黑话分类版)

on:
  schedule:
    - cron: '16 16 * * *'
  workflow_dispatch:


permissions:
  contents: write


jobs:
  run-script:

    runs-on: ubuntu-latest


    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"


    - name: Run generator
      shell: bash
      run: |

        echo "========== 环境 =========="
        python --version
        pwd
        ls -lah


        echo "========== 执行 Python =========="

        python -u main.py


        echo "========== 查看生成文件 =========="

        ls -lah *.txt *.csv 2>/dev/null || true



    - name: Validate output
      shell: bash
      run: |

        echo "========== 文件检测 =========="

        files=(
          "vless_api_all.txt"
          "cm中转ipv4.csv"
          "cm中转ipv6.csv"
        )


        for file in "${files[@]}"
        do

          if [ -f "$file" ]; then

            echo "✅ $file"

            wc -l "$file"

          else

            echo "❌ 缺失 $file"

          fi

        done



    - name: Commit changes
      shell: bash
      run: |

        git config user.email "github-actions[bot]@users.noreply.github.com"

        git config user.name "github-actions[bot]"


        git add -A


        if git diff --cached --quiet;

        then

          echo "没有文件变化"

        else

          git commit -m "自动刷新优选IP列表"

          git push

        fi
