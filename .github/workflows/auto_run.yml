name: 自动拉取反代IP(带国家备注版)

on:
  # 每天北京时间早上 8:00 自动运行 (UTC 0:00)
  schedule:
    - cron: '0 0 * * *'
  # 允许在 GitHub 页面上手动触发运行
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    # 解决 Node.js 20 弃用警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    # 1. 检出仓库代码
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2

    # 2. 安装 Python 环境
    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    # 3. 在线动态生成并运行带有国家备注的 Python 脚本
    - name: Create and Run Script
      run: |
        cat << 'EOF' > temp_script.py
        import os
        import json
        import urllib.request
        import urllib.error

        def generate_vless_from_api():
            TARGET_COUNTRY = None
            TARGET_ASNS = {906, 25820, 32097, 63888, 396982, 137929, 40065, 135064, 4809, 9929, 58453}
            TARGET_PORT = None

            API_URL = "https://zip.cm.edu.kg/all.json"
            
            print(f"建立网络连接: 开始抓取目标接口数据 {API_URL}")
            try:
                request_headers = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'}
                req = urllib.request.Request(API_URL, headers=request_headers)
                with urllib.request.urlopen(req, timeout=20) as response:
                    json_response = response.read().decode('utf8')
                    raw_data = json.loads(json_response)
            except Exception as e:
                print(f"致命阻断: 网络通信故障 详情: {e}")
                return

            node_data_list = []
            if isinstance(raw_data, list):
                node_data_list = raw_data
            elif isinstance(raw_data, dict):
                for key, value in raw_data.items():
                    if isinstance(value, list): node_data_list.extend(value)
                    elif isinstance(value, dict): node_data_list.append(value)

            if not node_data_list:
                print("致命阻断: 数据源为空。")
                return
                
            seen_ips = set()
            final_links = []
            
            # 用于分国家或总序号计数
            counter = 0

            for item in node_data_list:
                if not isinstance(item, dict): continue
                meta_data = item.get("meta", {})
                port = item.get("_port") or meta_data.get("_port")
                if port is None:
                    port_list = item.get("port")
                    if isinstance(port_list, list) and len(port_list) > 0: port = port_list[0]
                        
                country = meta_data.get("country", "Unknown")
                asn = meta_data.get("asn")
                
                # 从原始数据尝试提取组织/品牌名称，如果拿不到就用 ASN 代替
                org_name = meta_data.get("org", "").split()[0] if meta_data.get("org") else f"AS{asn}"
                # 清洗一下组织名字，去掉特殊字符
                org_name = "".join(e for e in org_name if e.isalnum())

                if port is None: continue
                if TARGET_COUNTRY and country != TARGET_COUNTRY: continue
                if TARGET_ASNS and asn not in TARGET_ASNS: continue
                if TARGET_PORT and int(port) != TARGET_PORT: continue
                
                v4_ip = item.get("ip")
                v6_ip = meta_data.get("clientIp")
                
                node_ips = []
                if v4_ip: node_ips.append(v4_ip)
                if v6_ip: node_ips.append(v6_ip)
                    
                for current_ip in node_ips:
                    if current_ip in seen_ips: continue
                    seen_ips.add(current_ip)
                    
                    if ":" in current_ip:
                        formatted_ip = f"[{current_ip}]"
                    else:
                        formatted_ip = current_ip
                    
                    # 序号递增并格式化为两位数（如 01, 02）
                    counter += 1
                    idx_str = f"{counter:02d}"
                    
                    # 【核心修改点】拼接出：IP:端口#CM_品牌_国家_序号
                    full_url = f"{formatted_ip}:{port}#CM_{org_name}_{country}_{idx_str}"
                    final_links.append(full_url)

            total_links = len(final_links)
            print(f"多维匹配完成: 精确筛出并去重 {total_links} 个独立优选IP。")

            if total_links == 0: return

            output_filename = "vless_api_all.txt"
            with open(output_filename, 'w', encoding='utf8') as out_f:
                for link in final_links: 
                    out_f.write(link + "\n")
            print(f"数据固化: 所有数据已成功合并写入 {output_filename}")

        if __name__ == "__main__":
            generate_vless_from_api()
        EOF
        
        # 运行临时脚本
        python temp_script.py

    # 4. 把合并后的单个 txt 文件自动提交并推送到仓库
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add vless_api_all.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "自动更新合并版优选IP列表(带国家备注)"
        git push
