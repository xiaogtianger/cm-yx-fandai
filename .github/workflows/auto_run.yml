name: 自动拉取反代IP(中文黑话分类版)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 必须添加此权限，否则 GitHub Actions 没有权限向仓库提交生成的 TXT 和 CSV
permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4.2.2

    - name: Set up Python
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.10'

    - name: Create and Run Script
      run: |
        cat << 'EOF' > temp_script.py
        import os
        import json
        import csv
        import urllib.request
        import urllib.error

        def generate_vless_from_api():
            TARGET_ASNS = {906, 25820, 32097, 63888, 396982, 137929, 40065, 135064, 4809, 9929, 58453, 36002, 8143}
            NICKNAMES = {
                "36002": "狗妈", "8143": "奶爸", "906": "大妈",
                "396982": "Google LLC", "137929": "亚太大妈", "58453": "移动 CMI",
                "25820": "搬瓦工", "9929": "联通A网", "63888": "Datawing Limited",
                "135064": "Rio Tinto IS&T", "4809": "电信CN2", "40065": "CNSERVERS",
                "32097": "WholeSale Internet"
            }
            API_URL = "https://zip.cm.edu.kg/all.json"
            
            try:
                req = urllib.request.Request(API_URL, headers={'User-Agent': 'Mozilla/5.0'})
                with urllib.request.urlopen(req, timeout=20) as response:
                    raw_data = json.loads(response.read().decode('utf8'))
            except Exception as e:
                print(f"TXT抓取失败: {e}")
                return

            node_data_list = raw_data if isinstance(raw_data, list) else []
            if isinstance(raw_data, dict):
                for v in raw_data.values():
                    if isinstance(v, list): node_data_list.extend(v)

            final_links = []
            seen_ips = set()
            for item in node_data_list:
                meta = item.get("meta", {})
                port = item.get("_port") or meta.get("_port")
                asn = meta.get("asn")
                if port and asn in TARGET_ASNS:
                    org_name = NICKNAMES.get(str(asn), meta.get("org", f"AS{asn}"))
                    country = meta.get("country", "Unknown")
                    for ip in [item.get("ip"), meta.get("clientIp")]:
                        if ip and ip not in seen_ips:
                            seen_ips.add(ip)
                            formatted_ip = f"[{ip}]" if ":" in ip else ip
                            final_links.append(f"{formatted_ip}:{port}#CM_{org_name}_{country}_{len(final_links)+1:02d}")

            if final_links:
                with open("vless_api_all.txt", 'w', encoding='utf8') as f:
                    f.write("\n".join(final_links))
                print(f"成功生成 {len(final_links)} 个节点。")

        def generate_csv_from_api():
            API_URL = "https://zip.cm.edu.kg/all.json"
            try:
                with urllib.request.urlopen(urllib.request.Request(API_URL, headers={'User-Agent': 'Mozilla/5.0'}), timeout=20) as response:
                    raw_data = json.loads(response.read().decode('utf8'))
                
                node_list = raw_data if isinstance(raw_data, list) else []
                if isinstance(raw_data, dict):
                    for v in raw_data.values():
                        if isinstance(v, list): node_list.extend(v)

                v4, v6 = [], []
                for item in node_list:
                    port = item.get("_port") or item.get("meta", {}).get("_port")
                    ip = item.get("ip")
                    if port and ip:
                        if ":" in str(ip): v6.append({"ip": ip, "port": port})
                        else: v4.append({"ip": ip, "port": port})

                for name, data in [("cm中转ipv4.csv", v4), ("cm中转ipv6.csv", v6)]:
                    if data:
                        with open(name, 'w', encoding='utf-8', newline='\n') as f:
                            w = csv.DictWriter(f, fieldnames=["ip", "port"], lineterminator='\n')
                            w.writeheader()
                            w.writerows(data)
            except Exception as e:
                print(f"CSV生成失败: {e}")

        if __name__ == "__main__":
            generate_vless_from_api()
            generate_csv_from_api()
        EOF
        python temp_script.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git config --global core.quotepath false
        
        # 仅暂存生成的文件
        git add vless_api_all.txt cm中转ipv4.csv cm中转ipv6.csv || true
        
        # 检查是否有内容变更，有变更才提交，避免空提交导致的混乱
        if ! git diff --cached --quiet; then
          git commit -m "自动定时刷新优选IP列表及CSV"
          git push origin HEAD
        else
          echo "文件无变化，无需提交。"
        fi
